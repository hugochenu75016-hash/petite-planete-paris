<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Petite Planète — Paris 3D</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/DRACOLoader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/opentype.js@1.3.4/dist/opentype.min.js"></script>
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #FF7A00; overflow: hidden; }
  #wrap { position: absolute; inset: 0; background: #FF7A00; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; }
  #scene { display: block; width: 100%; height: 100%; touch-action: none; position: relative; z-index: 2; }

  /* ===== Titre animé au-dessus de la planète ===== */
  #title {
    position: absolute;
    top: clamp(8px, 1.6vh, 22px);
    left: 0;
    right: 0;
    text-align: center;
    pointer-events: none;
    z-index: 1;
  }
  #title .kicker {
    font-size: clamp(11px, 1.4vw, 16px);
    letter-spacing: 0.55em;
    text-transform: uppercase;
    color: rgba(40, 20, 0, 0.62);
    font-weight: 600;
    margin: 0 0 0.55em 0.55em;
    opacity: 0;
    transform: translateY(8px);
    animation: kickerIn 0.9s cubic-bezier(.22,1,.36,1) 0.2s forwards;
  }
  #title h1 {
    margin: 0;
    display: inline-block;
    font-family: 'Fredoka', 'Baloo 2', 'Helvetica Neue', sans-serif;
    font-weight: 700;
    font-size: clamp(30px, 5.4vw, 78px);
    line-height: 0.95;
    letter-spacing: 0.005em;
    color: #ffffff;
    -webkit-text-stroke: 3.5px #7a3300;
    paint-order: stroke fill;
    text-shadow:
      0 2px 0 #7a3300,
      0 4px 0 #632900,
      0 6px 0 #4d2000,
      0 12px 20px rgba(70, 28, 0, 0.5);
  }
  #title h1 .ltr {
    display: inline-block;
    opacity: 0;
    transform: translateY(0.5em) rotate(6deg);
    animation: letterIn 0.7s cubic-bezier(.2,1.2,.3,1) forwards;
  }
  #title h1 .ltr.space { width: 0.55em; }
  #title .underline {
    height: 4px;
    width: 0;
    background: #fff8ef;
    border-radius: 4px;
    margin: 0.5em auto 0;
    box-shadow: 0 3px 12px rgba(120, 50, 0, 0.3);
    animation: lineGrow 0.8s cubic-bezier(.65,0,.35,1) 1.1s forwards;
  }
  @keyframes kickerIn {
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes letterIn {
    to { opacity: 1; transform: translateY(0) rotate(0); }
  }
  @keyframes lineGrow {
    to { width: clamp(80px, 16vw, 240px); }
  }

  /* ===== Boutons CTA — "liquid glass" Apple ===== */
  #cta-left, #cta-right {
    position: absolute;
    top: clamp(20px, 3.5vh, 40px);
    display: flex;
    flex-direction: row;
    align-items: flex-start;
    gap: 16px;
    z-index: 20;
  }
  #cta-left { left: clamp(20px, 4vw, 64px); }
  #cta-right { right: clamp(20px, 4vw, 64px); }

  /* ===== Bouton ENTRER — relief + contour orange néon ===== */
  #enter-wrap {
    position: absolute;
    left: 50%;
    bottom: clamp(28px, 6vh, 56px);
    transform: translateX(-50%);
    z-index: 20;
  }
  .enter-btn {
    position: relative;
    cursor: pointer;
    font-family: 'Fredoka', 'Helvetica Neue', sans-serif;
    font-weight: 700;
    font-size: clamp(20px, 2.2vw, 30px);
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: #fff8ef;
    padding: 16px 60px;
    border-radius: 999px;
    border: 2.5px solid transparent;
    background: transparent;
    box-shadow: none;
    text-shadow:
      0 0 8px rgba(255, 160, 70, 0.95),
      0 0 18px rgba(255, 130, 30, 0.8),
      0 2px 3px rgba(150, 70, 0, 0.55);
    transition: transform .28s cubic-bezier(.2, 1, .3, 1), text-shadow .28s ease;
    animation: neonPulse 2.4s ease-in-out infinite;
  }
  .enter-btn:hover {
    transform: translateY(-2px) scale(1.05);
    text-shadow:
      0 0 12px rgba(255, 180, 90, 1),
      0 0 28px rgba(255, 140, 40, 0.95),
      0 2px 3px rgba(150, 70, 0, 0.6);
  }
  .enter-btn:active { transform: translateX(0) scale(0.99); }
  @keyframes neonPulse {
    0%, 100% {
      text-shadow:
        0 0 8px rgba(255, 160, 70, 0.95),
        0 0 18px rgba(255, 130, 30, 0.8),
        0 2px 3px rgba(150, 70, 0, 0.55);
    }
    50% {
      text-shadow:
        0 0 12px rgba(255, 180, 90, 1),
        0 0 30px rgba(255, 140, 40, 0.95),
        0 2px 3px rgba(150, 70, 0, 0.55);
    }
  }
  .glass-btn {
    position: relative;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    border: 1px solid rgba(255, 255, 255, 0.55);
    cursor: pointer;
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.13em;
    text-transform: uppercase;
    white-space: nowrap;
    color: #fff;
    padding: 15px 30px;
    border-radius: 999px;
    background:
      linear-gradient(to bottom,
        rgba(255, 255, 255, 0.55) 0%,
        rgba(255, 255, 255, 0.16) 45%,
        rgba(255, 255, 255, 0.06) 100%);
    box-shadow:
      inset 0 1.5px 1px rgba(255, 255, 255, 0.95),
      inset 0 -5px 12px rgba(255, 150, 60, 0.22),
      inset 0 0 0 1px rgba(255, 255, 255, 0.10),
      0 10px 26px rgba(120, 50, 0, 0.30);
    text-shadow: 0 1px 2px rgba(150, 70, 0, 0.4);
    transition: transform .28s cubic-bezier(.2, 1, .3, 1), box-shadow .28s ease, background .28s ease;
  }
  .glass-btn:hover {
    transform: translateY(-2px) scale(1.035);
    background:
      linear-gradient(to bottom,
        rgba(255, 255, 255, 0.70) 0%,
        rgba(255, 255, 255, 0.24) 45%,
        rgba(255, 255, 255, 0.10) 100%);
    box-shadow:
      inset 0 1.5px 1px rgba(255, 255, 255, 1),
      inset 0 -5px 14px rgba(255, 150, 60, 0.32),
      0 14px 32px rgba(120, 50, 0, 0.38);
  }
  .glass-btn:active { transform: translateY(0) scale(0.99); }

  /* ===== Éléments latéraux : décor flottant, réseaux, étiquettes ===== */
  #side-decor {
    position: absolute;
    inset: 0;
    z-index: 3;
    pointer-events: none;
    overflow: hidden;
  }
  /* Nuages 3D en relief */
  .cloud {
    position: absolute;
    width: 90px; height: 34px;
    background: linear-gradient(to bottom, #ffffff 0%, #fff3e0 55%, #f6d7ad 100%);
    border-radius: 40px;
    opacity: 0.96;
    box-shadow:
      inset 0 5px 6px rgba(255, 255, 255, 0.95),
      inset 0 -8px 10px rgba(190, 120, 50, 0.35),
      0 14px 26px rgba(120, 50, 0, 0.30);
  }
  .cloud::before, .cloud::after {
    content: ""; position: absolute; border-radius: 50%;
    background: radial-gradient(circle at 38% 30%, #ffffff 0%, #fff0da 60%, #f2cfa0 100%);
    box-shadow:
      inset 0 4px 5px rgba(255, 255, 255, 0.95),
      inset 0 -5px 8px rgba(190, 120, 50, 0.32);
  }
  .cloud::before { width: 42px; height: 42px; top: -18px; left: 12px; }
  .cloud::after  { width: 30px; height: 30px; top: -12px; left: 46px; }
  /* Étincelles (sparkles) 4 branches */
  .spark {
    position: absolute; width: 18px; height: 18px;
  }
  .spark::before, .spark::after {
    content: ""; position: absolute; top: 50%; left: 50%;
    background: #fff8ef; border-radius: 2px;
    box-shadow: 0 0 8px rgba(255, 240, 200, 0.9);
    transform: translate(-50%, -50%);
  }
  .spark::before { width: 3px; height: 100%; }
  .spark::after  { width: 100%; height: 3px; }
  /* Mini-planètes */
  .mini-planet {
    position: absolute; width: 46px; height: 46px; border-radius: 50%;
    background: radial-gradient(circle at 32% 28%, #fff2d6, #ffb347 55%, #d9741a 100%);
    box-shadow: inset -6px -6px 10px rgba(120,50,0,0.35), 0 10px 22px rgba(120,50,0,0.25);
  }
  .mini-planet::after {
    content: ""; position: absolute; left: 50%; top: 50%;
    width: 76px; height: 22px; border-radius: 50%;
    border: 4px solid rgba(255, 248, 239, 0.75);
    transform: translate(-50%, -50%) rotate(-24deg);
  }
  /* Étiquettes flottantes reliées à la planète */
  .side-badge {
    position: absolute; display: flex; align-items: center; gap: 0;
    z-index: 4; pointer-events: none;
  }
  .side-badge .pill {
    font-family: 'Fredoka', 'Helvetica Neue', sans-serif;
    font-weight: 600; font-size: 13px; white-space: nowrap;
    color: #fff7db; padding: 8px 16px; border-radius: 999px;
    border: 1px solid rgba(255, 255, 140, 0.85);
    background: linear-gradient(to bottom, rgba(255,255,255,0.42) 0%, rgba(255,255,255,0.12) 100%);
    box-shadow: inset 0 1.5px 1px rgba(255,255,255,0.9), 0 8px 20px rgba(120,50,0,0.28);
    text-shadow: 0 1px 2px rgba(150,70,0,0.4);
    backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
  }
  .side-badge .conn {
    width: 46px; height: 0; border-top: 2px dashed rgba(255, 248, 239, 0.7);
  }
  .side-badge .node {
    width: 10px; height: 10px; border-radius: 50%;
    background: #fff8ef; box-shadow: 0 0 10px rgba(255, 240, 200, 0.9);
    flex: 0 0 auto;
  }
  /* Colonne réseaux sociaux */
  #social-rail {
    position: absolute; right: clamp(18px, 3.4vw, 46px); top: 50%;
    transform: translateY(-50%);
    display: flex; flex-direction: column; gap: 14px; z-index: 20;
  }
  .social-btn {
    width: 46px; height: 46px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; color: #fff7db; text-decoration: none;
    border: 1px solid rgba(255, 255, 140, 0.85);
    background: linear-gradient(to bottom, rgba(255,255,255,0.45) 0%, rgba(255,255,255,0.12) 100%);
    box-shadow: inset 0 1.5px 1px rgba(255,255,255,0.9), inset 0 -4px 10px rgba(255,150,60,0.22), 0 8px 20px rgba(120,50,0,0.28);
    backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
    transition: transform .26s cubic-bezier(.2,1,.3,1), box-shadow .26s ease;
  }
  .social-btn:hover {
    transform: translateY(-2px) scale(1.08);
    box-shadow: inset 0 1.5px 1px rgba(255,255,255,1), 0 12px 26px rgba(120,50,0,0.34);
  }
  .social-btn svg { width: 22px; height: 22px; }
  .social-btn .ln {
    font-family: 'Fredoka', sans-serif; font-weight: 700; font-size: 19px;
    line-height: 1; text-shadow: 0 1px 2px rgba(150,70,0,0.4);
  }
  /* Animations douces */
  @keyframes floatY { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-16px); } }
  @keyframes floatY2 { 0%,100% { transform: translateY(0); } 50% { transform: translateY(12px); } }
  @keyframes twinkle { 0%,100% { opacity: 0.35; transform: scale(0.8) rotate(0deg); } 50% { opacity: 1; transform: scale(1.15) rotate(90deg); } }
  @keyframes drift { 0%,100% { transform: translateX(0); } 50% { transform: translateX(18px); } }
  .anim-f  { animation: floatY 6s ease-in-out infinite; }
  .anim-f2 { animation: floatY2 7.5s ease-in-out infinite; }
  .anim-tw { animation: twinkle 3.4s ease-in-out infinite; }
  .anim-dr { animation: drift 9s ease-in-out infinite; }
  @media (max-width: 720px) {
    .side-badge, #side-decor { display: none; }
  }

  /* ===== Écran de chargement plein écran (masque tout) ===== */
  #char-loader {
    position: fixed; inset: 0;
    background: #FF7A00;
    z-index: 9999; pointer-events: all;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 20px;
    transition: opacity 0.6s ease;
  }
  #char-loader.hidden { opacity: 0; }
  .cl-spinner {
    width: 54px; height: 54px; border-radius: 50%;
    border: 5px solid rgba(255, 248, 239, 0.32);
    border-top-color: #fff8ef;
    box-shadow: 0 8px 22px rgba(120, 50, 0, 0.3);
    animation: clSpin 0.9s linear infinite;
  }
  @keyframes clSpin { to { transform: rotate(360deg); } }
  .cl-text {
    font-family: 'Fredoka', 'Helvetica Neue', sans-serif;
    font-weight: 600; font-size: 15px; letter-spacing: 0.02em;
    color: #fff7db; text-shadow: 0 1px 2px rgba(150, 70, 0, 0.4);
  }
  .cl-bar {
    width: 190px; height: 9px; border-radius: 999px;
    background: rgba(255, 248, 239, 0.28);
    box-shadow: inset 0 1px 2px rgba(120, 50, 0, 0.32);
    overflow: hidden;
  }
  .cl-fill {
    height: 100%; width: 0%; border-radius: 999px;
    background: linear-gradient(to right, #fff2d6, #ffb347);
    box-shadow: 0 0 8px rgba(255, 200, 120, 0.6);
    transition: width 0.25s ease;
  }
</style>
<link id="gfont-Permanent-Marker" rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Permanent+Marker:wght@300;400;500;600;700&amp;display=swap">
<link id="gfont-Caveat" rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Caveat:wght@300;400;500;600;700&amp;display=swap">
<link id="gfont-Fredoka" rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&amp;display=swap">
</head>
<body style="font-family: &quot;Permanent Marker&quot;">
<div id="wrap">
  <canvas id="scene"></canvas>
  <div id="title"><h1 style="width: 528px; height: 42px">Mon Copain Digital</h1></div>
  <nav id="cta-left">
    <button class="glass-btn" style="font-family: Fredoka, sans-serif; color: rgb(255, 247, 219); font-weight: 900; border-color: rgb(255, 255, 140); width: 121px; height: 43px; font-size: 14px; letter-spacing: 0.04em; padding-left: 8px; padding-right: 8px" onclick="location.href='https://moncopaindigital.fr/'">Qui suis-je ?</button>
    <button class="glass-btn" style="font-family: Fredoka, sans-serif; color: rgb(255, 247, 219); font-weight: 900; border-color: rgb(255, 255, 140); width: 130px; height: 44px; font-size: 14px; letter-spacing: 0.04em; padding-left: 8px; padding-right: 8px; white-space: normal; line-height: 1.05" onclick="location.href='https://moncopaindigital.fr/'">rendez-vous</button>
  </nav>
  <nav id="cta-right">
    <button class="glass-btn" style="font-family: Fredoka, sans-serif; color: rgb(255, 247, 219); font-weight: 900; border-color: rgb(255, 255, 140); width: 123px; height: 44px" onclick="location.href='https://moncopaindigital.fr/'">Contact</button>
    <button class="glass-btn" style="font-family: Fredoka, sans-serif; color: rgb(255, 247, 219); font-weight: 900; border-color: rgb(255, 255, 140); width: 123px; height: 44px; font-size: 14px; letter-spacing: 0.04em; padding-left: 8px; padding-right: 8px; white-space: normal; line-height: 1.05" onclick="location.href='https://moncopaindigital.fr/'">nos offres</button>
  </nav>
  <div id="enter-wrap">
    <button class="enter-btn" onclick="location.href='https://moncopaindigital.fr/'">Explorer</button>
  </div>

  <!-- Indicateur de chargement du personnage 3D -->
  <div id="char-loader">
    <div class="cl-spinner"></div>
    <div class="cl-text" id="cl-txt">Chargement du personnage…</div>
    <div class="cl-bar"><div class="cl-fill" id="cl-fill"></div></div>
  </div>

  <!-- Décor flottant (gauche + droite) -->
  <div id="side-decor">
    <!-- Gauche -->
    <div class="cloud anim-dr" style="left: 202px; top: 614px; animation-delay: -1s; position: absolute"></div>
    <div class="cloud anim-f2" style="left: 84px; top: 319px; transform: scale(0.75); animation-delay: -3s; position: absolute"></div>
    <!-- Droite -->
    <div class="cloud anim-dr" style="right: 6%; top: 22%; animation-delay: -4s"></div>
    <div class="cloud anim-f" style="right: 11%; top: 68%; transform: scale(0.7); animation-delay: -2.5s"></div>
    <div class="cloud anim-f2" style="left: 364px; top: 194px; transform: scale(0.85); animation-delay: -5s; position: absolute"></div>
  </div>

  <!-- Étiquette flottante reliée à la planète -->
  <div class="side-badge anim-f" style="left: clamp(20px, 5vw, 90px); top: 42%; animation-delay: -0.5s"></div>

  <!-- Réseaux sociaux -->
  <div id="social-rail">
    <a class="social-btn" href="https://www.instagram.com/moncopaindigital/" target="_blank" rel="noopener" aria-label="Instagram">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="3" y="3" width="18" height="18" rx="5"></rect>
        <circle cx="12" cy="12" r="4"></circle>
        <circle cx="17.2" cy="6.8" r="1.1" fill="currentColor" stroke="none"></circle>
      </svg>
    </a>
    <a class="social-btn" href="https://www.linkedin.com/" target="_blank" rel="noopener" aria-label="LinkedIn">
      <span class="ln">in</span>
    </a>
  </div>
</div>
<script>
function start() {
  if (!window.THREE) { setTimeout(start, 30); return; }

    const THREE = window.THREE;
    const canvas = document.getElementById("scene");
    const R = 10;

    let s = 1337;
    const rnd = () => { s = (s * 1664525 + 1013904223) >>> 0; return s / 4294967296; };
    const range = (a, b) => a + (b - a) * rnd();

    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true, preserveDrawingBuffer: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(34, 1, 0.1, 200);
    let camDist = 44;

    scene.add(new THREE.AmbientLight(0xfff2e0, 0.85));
    const sun = new THREE.DirectionalLight(0xffe6c2, 1.25);
    sun.position.set(14, 22, 12);
    sun.castShadow = true;
    sun.shadow.mapSize.set(2048, 2048);
    sun.shadow.camera.near = 1; sun.shadow.camera.far = 80;
    sun.shadow.camera.left = -22; sun.shadow.camera.right = 22;
    sun.shadow.camera.top = 22; sun.shadow.camera.bottom = -22;
    sun.shadow.bias = -0.0004;
    scene.add(sun);
    const fill = new THREE.DirectionalLight(0xbcd0ff, 0.35);
    fill.position.set(-12, -6, -10);
    scene.add(fill);

    // Layer dédié à la chaise + au personnage (éclairés par charKey/charFill/charAmb)
    const CHAIR_LAYER = 1;

    const world = new THREE.Group();
    scene.add(world);
    world.scale.setScalar(0.92);   // réduit légèrement la planète + le personnage (ensemble, il reste assis)

    const UP = new THREE.Vector3(0, 1, 0);
    const tmpQ = new THREE.Quaternion();
    const posOnSphere = (lat, lon, r) => {
      const phi = (90 - lat) * Math.PI / 180;
      const th = lon * Math.PI / 180;
      return new THREE.Vector3(
        r * Math.sin(phi) * Math.cos(th),
        r * Math.cos(phi),
        r * Math.sin(phi) * Math.sin(th)
      );
    };
    const orient = (obj, normal, spin) => {
      obj.quaternion.setFromUnitVectors(UP, normal.clone().normalize());
      if (spin) { tmpQ.setFromAxisAngle(normal.clone().normalize(), spin); obj.quaternion.premultiply(tmpQ); }
    };

    const land = new THREE.Mesh(
      new THREE.SphereGeometry(R, 96, 48, 0, Math.PI * 2, 0, Math.PI / 2),
      new THREE.MeshStandardMaterial({ color: 0x5f8f3e, roughness: 0.95, metalness: 0 })
    );
    land.receiveShadow = true;
    world.add(land);
    const cut = new THREE.Mesh(
      new THREE.CircleGeometry(R, 96),
      new THREE.MeshStandardMaterial({ color: 0x6b5333, roughness: 1, side: THREE.DoubleSide })
    );
    cut.rotation.x = Math.PI / 2;
    cut.position.y = 0;
    world.add(cut);

    const stoneCols = [0xd8ccb4, 0xcdbfa6, 0xc7bda9, 0xbcae93, 0xd2c7b0, 0xc2b69c];
    const roofCol = 0x6f7682;
    const stoneMats = stoneCols.map(c => new THREE.MeshStandardMaterial({ color: c, roughness: 0.9 }));
    const roofMat = new THREE.MeshStandardMaterial({ color: roofCol, roughness: 0.8 });
    const slateMat = new THREE.MeshStandardMaterial({ color: 0x4d535d, roughness: 0.7 });
    const creamMat = new THREE.MeshStandardMaterial({ color: 0xeae3d2, roughness: 0.85 });
    const whiteMat = new THREE.MeshStandardMaterial({ color: 0xb6ad9a, roughness: 0.75 });
    const ironMat = new THREE.MeshStandardMaterial({ color: 0x6b5a44, roughness: 0.6, metalness: 0.3 });
    const treeMat = new THREE.MeshStandardMaterial({ color: 0x3c7a2e, roughness: 1 });
    const treeMat2 = new THREE.MeshStandardMaterial({ color: 0x4f9438, roughness: 1 });
    const waterMat = new THREE.MeshStandardMaterial({ color: 0x5b93ab, roughness: 0.22, metalness: 0.4, side: THREE.DoubleSide });
    const roadMat = new THREE.MeshStandardMaterial({ color: 0x8c8779, roughness: 1 });
    const glassMat = new THREE.MeshStandardMaterial({ color: 0xbfd6e0, roughness: 0.15, metalness: 0.4, transparent: true, opacity: 0.75 });

    const makeFacade = (baseHex) => {
      const cw = 96, ch = 168;
      const c = document.createElement('canvas'); c.width = cw; c.height = ch;
      const x = c.getContext('2d');
      x.fillStyle = '#' + baseHex.toString(16).padStart(6, '0'); x.fillRect(0, 0, cw, ch);
      const e = document.createElement('canvas'); e.width = cw; e.height = ch;
      const ex = e.getContext('2d'); ex.fillStyle = '#000'; ex.fillRect(0, 0, cw, ch);
      const cols = 4, rows = 7, mx = 12, my = 14;

        title.position.set(0, dropY, 0);
        rig.add(title);

        // Deux ficelles de ballon accrochées au sommet des lettres hautes (« M » et « l »)
        const titleTopY = dropY + bb.max.y;
        const wireMat = new THREE.MeshStandardMaterial({ color: 0xf2ece0, roughness: 0.8, metalness: 0 });
        [bb.min.x * 0.92, bb.max.x * 0.95].forEach((wx) => {
          const len = -titleTopY;        // de y=0 (ancrage) jusqu'au sommet des lettres
          const wire = new THREE.Mesh(new THREE.CylinderGeometry(0.022, 0.022, len, 6), wireMat);
          wire.position.set(wx, titleTopY / 2, 0.55);   // un peu en avant, devant la face des lettres
          rig.add(wire);
          // petit nœud du ballon là où la ficelle rejoint la lettre
          const knot = new THREE.Mesh(new THREE.SphereGeometry(0.09, 10, 8), wireMat);
          knot.position.set(wx, titleTopY, 0.55);
          rig.add(knot);
        });

        (function sway() {
          requestAnimationFrame(sway);
          const t = performance.now() / 1000;
          // balancement de pendule autour du point d'ancrage + léger bob vertical
          rig.rotation.z = Math.sin(t * 0.7) * 0.035;
          rig.rotation.x = Math.sin(t * 0.5) * 0.02;
          rig.position.y = 33 + Math.sin(t * 0.9) * 0.3;
        })();
      });
    })();

    let rotY = 4.71, rotX = 0.0, tRotY = 4.71, tRotX = 0.0;
    const autoSpin = true;

    const resize = () => {
      const w = canvas.clientWidth, h = canvas.clientHeight;
      renderer.setSize(w, h, false);
      camera.aspect = w / h; camera.updateProjectionMatrix();
    };
    resize();
    window.addEventListener('resize', resize);

    const animate = () => {
      requestAnimationFrame(animate);
      if (autoSpin) tRotY += 0.0016;
      rotY += (tRotY - rotY) * 0.08;
      rotX += (tRotX - rotX) * 0.08;
      world.rotation.y = rotY;
      world.rotation.x = rotX;
      const VY = 10;
      camera.position.set(0, camDist * 0.42 + VY, camDist * 0.9);
      camera.lookAt(0, R * 0.32 + VY, 0);
      renderer.render(scene, camera);
    };
    animate();
}
start();
</script>
</body>
